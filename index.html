<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ゴールド専用ロット数計算機</title>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif; margin: 24px; background: #fafafa; }
  h1 { font-size: 1.3rem; margin-bottom: 8px; text-align:center; }
  .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 12px; background:#fff; }
  label { display:block; font-size: 0.95rem; margin: 8px 0 4px; font-weight: bold; }
  .sub-label { font-size: 0.8rem; color: #666; margin-bottom: 8px; display: block; font-weight: normal; }
  input[type="number"] { width: 100%; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 8px; box-sizing:border-box; }
  
  .field-group { margin-bottom: 16px; }
  
  .btn { display:block; width:100%; padding: 12px; font-size: 1rem; border: none; border-radius: 10px; background: #1a73e8; color: #fff; margin-top: 16px; cursor: pointer; font-weight: bold; }
  .btn:hover { background: #1557b0; }
  .out { font-size: 1.1rem; line-height: 1.6; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 1.3rem; color: #1a73e8; font-weight: bold; }
  .mono-tp { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 1.2rem; color: #2e7d32; font-weight: bold; }
  .muted { color: #666; font-size: .9rem; line-height: 1.5; }
  hr { border: none; border-top: 1px solid #e0e0e0; margin: 16px 0; }
</style>
</head>
<body>
  <h1>ゴールド専用ロット数計算機</h1>

  <div class="card">
    <div style="text-align: center; margin-bottom: 12px; font-size: 0.9rem; color: #555;">
      <span>口座環境: <b>USD建て</b></span> | <span>リスク: <b>0.5% 固定</b></span>
    </div>
    
    <hr style="margin-top: 0;">

    <div class="field-group">
      <label>① 総資金額 ($)</label>
      <input id="balance" type="number" inputmode="decimal" placeholder="例: 25000" value="25000">
    </div>
    
    <div class="field-group">
      <label>② エントリー予定価格 (ドル)</label>
      <input id="entryPrice" type="number" inputmode="decimal" placeholder="例: 4068.34" step="0.01">
    </div>

    <div class="field-group">
      <label>③ 損切り（SL）予定価格 (ドル)</label>
      <input id="slPrice" type="number" inputmode="decimal" placeholder="例: 4073.70" step="0.01">
    </div>

    <button class="btn" onclick="calc()">計算する</button>
  </div>

  <div class="card out" id="result" aria-live="polite">
    エントリー価格とSL価格を入力して「計算する」を押してください。
  </div>

  <div class="muted">
    <p><b>■ ゴールド（XAUUSD）専用計算仕様</b></p>
    <ul style="padding-left: 20px; margin-top: 4px;">
      <li>許容リスク：総資金の 0.5% 固定</li>
      <li>ゴールド契約サイズ：1ロット ＝ 100オンス（1ドル動くと100ドルの損益）</li>
      <li>利確目標（TP）：リスクリワード 1:1（利益0.5%目安）の決済目安価格を自動算出します。</li>
    </ul>
  </div>

<script>
function fmt(n, currencySymbol = '') {
  if (!isFinite(n) || isNaN(n)) return '-';
  const formatted = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }).format(n);
  return currencySymbol ? `${currencySymbol}${formatted}` : formatted;
}

function fmtLot(n) {
  if (!isFinite(n) || isNaN(n)) return '-';
  // ロット数は小数点以下2桁（海外口座の最小単位0.01に合わせる）で丸める
  return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }).format(n);
}

function calc() {
  const balance = parseFloat(document.getElementById('balance').value);
  const entryPrice = parseFloat(document.getElementById('entryPrice').value);
  const slPrice = parseFloat(document.getElementById('slPrice').value);
  
  // 許容リスクは0.5%固定
  const riskPct = 0.5;

  // 未入力・不正値チェック
  if ([balance, entryPrice, slPrice].some(v => !isFinite(v) || isNaN(v))) {
    document.getElementById('result').innerHTML = "未入力、または正しくない数値があります。";
    return;
  }

  // 損切り幅（価格差）の絶対値を計算
  const stopWidth = Math.abs(entryPrice - slPrice);

  if (stopWidth === 0) {
    document.getElementById('result').innerHTML = "エントリー価格とSL価格が同じです。";
    return;
  }

  // 許容損失額の計算（25,000ドルなら125ドル）
  const riskAmt = balance * (riskPct / 100);
  
  // ロット数の計算: 許容損失額 ÷ (損切り幅 × 100オンス)
  const lots = riskAmt / (stopWidth * 100);

  // 売買方向の判定（SLがエントリーより高ければショート、低ければロング）
  const isShort = slPrice > entryPrice;
  
  // 利益目標0.5%（リスクリワード1:1）となるTP価格の算出
  let tpPrice = 0;
  if (isShort) {
    tpPrice = entryPrice - stopWidth; // ショートならエントリーから引く
  } else {
    tpPrice = entryPrice + stopWidth; // ロングならエントリーに足す
  }

  const res = `
    <div><b>推奨ロット：</b> <span class="mono">${fmtLot(lots)}</span> ロット</div>
    <div><b>目標決済価格(TP)：</b> <span class="mono-tp">${fmt(tpPrice)}</span></div>
    <hr>
    <div>許容損失額 (0.5%)：$${fmt(riskAmt)}</div>
    <div>損切り値幅：${fmt(stopWidth)} ドル</div>
    <div>ポジション方向：${isShort ? '<span style="color:#d32f2f;font-weight:bold;">ショート(売)</span>' : '<span style="color:#388e3c;font-weight:bold;">ロング(買)</span>'}</div>
  `;
  document.getElementById('result').innerHTML = res;
}
</script>
</body>
</html>
